# Cloudflare Pages 배포 자동화 워크플로우
# 이 파일은 GitHub Actions를 사용해 코드가 푸시될 때마다 자동으로 빌드하고 배포합니다.

name: Cloudflare Pages 배포

# 이 워크플로우가 실행되는 조건
on:
  # main 브랜치에 코드가 push될 때 자동 실행
  push:
    branches:
      - main
  # main 브랜치로의 Pull Request가 생성될 때도 실행 (테스트용)
  pull_request:
    branches:
      - main

# 실제 작업을 정의하는 섹션
jobs:
  deploy:
    runs-on: ubuntu-latest  # Ubuntu 환경에서 실행
    permissions:
      contents: read        # 저장소 내용 읽기 권한
      deployments: write    # 배포 정보 작성 권한
    name: 빌드 및 Cloudflare Pages 배포
    steps:
      # 1단계: 저장소 코드 가져오기
      - name: 저장소 코드 다운로드
        uses: actions/checkout@v4

      # 2단계: npm 패키지 설치
      - name: 패키지 설치
        run: npm install

      # 3단계: 프로덕션 빌드
      - name: 빌드
        run: npm run build

      # 4단계: Cloudflare Pages에 배포
      - name: Cloudflare Pages에 배포
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}          # GitHub Secrets에 저장된 API 토큰
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}        # GitHub Secrets에 저장된 계정 ID
          command: pages deploy dist --project-name=minzza-test  # dist 폴더의 빌드 결과물을 배포
